language: python
python:
  - "3.5"
  - "3.6"
  - "3.7"
  - "3.8"
  - "3.9"
  - "3.9-dev"

# command to install dependencies
install:
  - pip install coverage python-coveralls typing deprecated mutmut

# command to run tests with coverage
script:
- coverage run --source=grammpy -m unittest discover -s tests -p "*Test.py" -q
- mutmut run --paths-to-mutate grammpy/ --no-backup --runner "python -m unittest discover -s tests -p \"*Test.py\"" > /dev/null

# report coverage
after_script:
- coverage report -m
- coveralls
- mutmut results

# disable email notifications
notifications:
  email: false
